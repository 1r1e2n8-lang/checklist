<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開閉チェックリスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;background:#F5F5F3;color:#1a1a1a;min-height:100vh}.page{max-width:760px;margin:0 auto;padding:1.5rem 1rem}.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #E0DED8}.header h1{font-size:18px;font-weight:600}.hright{display:flex;align-items:center;gap:8px}.dbadge{font-size:13px;color:#666;background:#fff;padding:5px 12px;border-radius:8px;border:1px solid #E0DED8}.sbadge{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid;display:inline-flex;align-items:center;gap:4px;font-weight:500}.sok{color:#0F6E56;background:#E1F5EE;border-color:#9FE1CB}.serr{color:#993C1D;background:#FAECE7;border-color:#F5C4B3}.sing{color:#666;background:#fff;border-color:#E0DED8}.tabs{display:flex;gap:4px;background:#E8E6E0;padding:4px;border-radius:10px;margin-bottom:1.25rem}.tab{flex:1;padding:8px 4px;font-size:13px;font-weight:500;border-radius:7px;border:none;background:transparent;color:#666;cursor:pointer}.tab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.08)}.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:1rem}.scard{background:#fff;border:1px solid #E0DED8;border-radius:12px;padding:14px 16px;cursor:pointer;position:relative}.scard:hover{border-color:#aaa}.sname{font-size:15px;font-weight:600;margin-bottom:6px}.smeta{font-size:12px;color:#888;display:flex;flex-direction:column;gap:3px}.sacts{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .15s}.scard:hover .sacts{opacity:1}.ibtn{width:28px;height:28px;border-radius:7px;border:1px solid #E0DED8;background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:#888;font-size:14px}.ibtn:hover{background:#f5f5f3;color:#1a1a1a}.ibtn.d:hover{background:#FAECE7;color:#993C1D;border-color:#F5C4B3}.bsm{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid #E0DED8;background:#fff;color:#666;cursor:pointer;display:inline-flex;align-items:center;gap:4px}.bsm:hover{background:#F5F5F3}.bpri{font-size:13px;padding:7px 16px;border-radius:8px;border:none;background:#1D9E75;color:#fff;cursor:pointer;font-weight:600}.bpri:hover{background:#0F6E56}.bcan{font-size:13px;padding:7px 14px;border-radius:8px;border:1px solid #E0DED8;background:#fff;color:#666;cursor:pointer}.fcard{background:#F5F5F3;border:1px dashed #C8C6C0;border-radius:12px;padding:14px 16px;margin-bottom:1rem}.flbl{font-size:12px;color:#666;margin-bottom:4px;display:block;font-weight:500}.fg{margin-bottom:10px}.fi{width:100%;font-size:14px;padding:8px 10px;border-radius:8px;border:1px solid #D0CEC8;background:#fff;color:#1a1a1a;font-family:inherit}.fi:focus{outline:none;border-color:#1D9E75}.fsl{width:100%;font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid #D0CEC8;background:#fff;color:#1a1a1a;font-family:inherit}.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}.tblock{background:#fff;border-left:3px solid #1D9E75;border-radius:0 10px 10px 0;border:1px solid #E0DED8;border-left-width:3px;padding:12px 14px;margin-bottom:1.25rem}.flblg{font-size:12px;font-weight:600;color:#0F6E56;margin-bottom:4px}.hota{width:100%;font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid #D0CEC8;background:#fff;color:#1a1a1a;resize:vertical;min-height:56px;font-family:inherit}.hota:focus{outline:none;border-color:#1D9E75}.ssel{font-size:14px;padding:7px 10px;border-radius:8px;border:1px solid #D0CEC8;background:#fff;color:#1a1a1a;min-width:130px;font-family:inherit}.pbtn{font-size:12px;color:#666;background:#fff;border:1px solid #E0DED8;border-radius:8px;padding:3px 10px;cursor:pointer}.pnote{font-size:12px;color:#666;background:#F5F5F3;border:1px solid #E0DED8;border-radius:8px;padding:8px 10px;margin-top:8px;white-space:pre-wrap}.unc-block{background:#FFF8E7;border:1px solid #F5C4B3;border-left:3px solid #D85A30;border-radius:0 8px 8px 0;padding:10px 14px;margin-top:8px}.unc-title{font-size:12px;font-weight:600;color:#D85A30;margin-bottom:6px}.unc-item{font-size:13px;color:#6B3A1F;padding:2px 0}.plbl{font-size:11px;color:#999;margin-bottom:3px}.sbar{background:#fff;border:1px solid #E0DED8;border-radius:10px;padding:10px 14px;margin-bottom:1.25rem;display:flex;align-items:center;gap:12px}.pt{flex:1;height:5px;background:#E8E6E0;border-radius:3px;overflow:hidden}.pf{height:100%;background:#1D9E75;border-radius:3px;transition:width .3s}.st{font-size:13px;color:#666;white-space:nowrap;font-weight:500}.tg{margin-bottom:1rem}.tlbl{font-size:12px;font-weight:600;color:#666;margin-bottom:6px;display:flex;align-items:center;gap:6px}.ci{background:#fff;border:1px solid #E0DED8;border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px;transition:opacity .15s}.ci.done{opacity:.45}.chk{width:22px;height:22px;border-radius:50%;border:2px solid #D0CEC8;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .15s}.chk.checked{background:#1D9E75;border-color:#1D9E75}.ib{flex:1;min-width:0}.it{font-size:14px;color:#1a1a1a;line-height:1.5}.it.done{text-decoration:line-through;color:#999}.iu{display:inline-flex;align-items:center;gap:3px;font-size:12px;color:#185FA5;text-decoration:none;margin-top:3px}.iu:hover{text-decoration:underline}.ia{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}.ci:hover .ia{opacity:1}.ebox{background:#F5F5F3;border:1px solid #D0CEC8;border-radius:10px;padding:14px;margin-bottom:8px}.arow{display:flex;gap:8px;margin-bottom:1rem}.bbk{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#666;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem;font-family:inherit}.bbk:hover{color:#1a1a1a}.stitle{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em}.shd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}.nos{text-align:center;padding:3rem 1rem;color:#888;font-size:14px}.ld{text-align:center;padding:3rem 1rem;color:#888;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:12px}.sp{width:24px;height:24px;border:2px solid #E0DED8;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="page" id="app"></div>
<script>

const FB_URL = 'https://openclose-b0e38-default-rtdb.firebaseio.com';
const DI={open:[{id:'o1',timing:'朝礼前',text:'出勤時手洗いうがい',url:''},{id:'o2',timing:'朝礼前',text:'前日の引継ぎを確認',url:''},{id:'o3',timing:'朝礼前',text:'ZOOMイン！店頭PC・バックヤードPC',url:''},{id:'o4',timing:'朝礼前',text:'【バックオフィス】現金は出したか',url:''},{id:'o5',timing:'朝礼前',text:'タスクをLINEに流す',url:''},{id:'o6',timing:'朝礼前',text:'自エリアのカメラ映像全てデスクトップに表示しているか',url:''},{id:'o7',timing:'朝礼',text:'朝礼参加',url:''},{id:'o8',timing:'開店まで',text:'メルカリの梱包・集荷の手配',url:''},{id:'o9',timing:'開店まで',text:'前日の電話履歴を確認（あれば折り返し）',url:''}],close:[{id:'c1',timing:'閉店2時間前',text:'不要書類のシュレッダー処分をしたか',url:''},{id:'c2',timing:'閉店2時間前',text:'メルカリの発送（即日発送）',url:''},{id:'c3',timing:'閉店2時間前',text:'店内掃き・テーブル拭き掃除',url:''},{id:'c4',timing:'閉店1時間前',text:'現金締め（バックオフィスも忘れずに）',url:''},{id:'c5',timing:'閉店1時間前',text:'貴金属締め（赤丸チェック・名前印鑑・重さ一致必須確認）',url:''},{id:'c6',timing:'閉店1時間前',text:'【ネクストKPI】数値入力はしたか',url:''},{id:'c7',timing:'最終チェック',text:'キャビネットの施錠',url:''},{id:'c8',timing:'最終チェック',text:'防犯チェック（店頭カメラ初期位置に戻す）',url:''},{id:'c9',timing:'最終チェック',text:'退勤時の手洗いうがい',url:''}]};
const DS=['斉藤','林','鈴木','木村','青木','渡邊','龍生','酒井'];
const TC={'朝礼前':'#1D9E75','朝礼':'#378ADD','開店まで':'#639922','閉店2時間前':'#BA7517','閉店1時間前':'#D85A30','最終チェック':'#993C1D'};
let D={stores:[],checks:{}},ss='ing',view='stores',sid=null,ctab='open',showAdd=false,eItem=null,showPrev=false,showAS=false,eStore=null,sTimer=null;

function tkey(){const d=new Date();if(d.getHours()<4)d.setDate(d.getDate()-1);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function pkey(){const d=new Date();if(d.getHours()<4)d.setDate(d.getDate()-1);d.setDate(d.getDate()-1);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function today(){const d=new Date();if(d.getHours()<4)d.setDate(d.getDate()-1);return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';}
function uid(){return 'x'+Date.now()+Math.random().toString(36).slice(2,6);}
function q(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function fbGet(path){
  const r=await fetch(FB_URL+path+'.json');
  return await r.json();
}
async function fbSet(path,data){
  const r=await fetch(FB_URL+path+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  return await r.json();
}

async function fbLoad(){
  try{
    const data=await fbGet('/app');
    if(data&&data.stores&&data.stores.length>0){
      D=data;
      if(!D.checks)D.checks={};
    }
    else{
      D={stores:[{id:'s1',name:'大谷地店',items:JSON.parse(JSON.stringify(DI)),staff:[...DS]}],checks:{}};
      await fbSet('/app',D);
    }
    ss='ok';
  }catch(err){console.error('load:',err);ss='err';D={stores:[{id:'s1',name:'大谷地店',items:JSON.parse(JSON.stringify(DI)),staff:[...DS]}],checks:{}};}
  render();
}

async function fbSave(){
  ss='ing';ubadge();
  try{
    await fbSet('/app',D);
    ss='ok';
  }catch(err){console.error('save:',err);ss='err';}
  ubadge();
}

function sched(){clearTimeout(sTimer);sTimer=setTimeout(fbSave,1200);}
function ubadge(){const el=document.getElementById('sb');if(el)el.outerHTML=badge();}
function badge(){
  if(ss==='ok')return '<div class="sbadge sok" id="sb">&#10003; 保存済み</div>';
  if(ss==='err')return '<div class="sbadge serr" id="sb">&#10007; 保存失敗</div>';
  return '<div class="sbadge sing" id="sb">&#8593; 保存中...</div>';
}

function st(){return D.stores.find(s=>s.id===sid)||null;}
function chks(){if(!D.checks)D.checks={};const k=sid+'_'+tkey()+'_'+ctab;if(!D.checks[k])D.checks[k]={};return D.checks[k];}
function togChk(id){const c=chks();c[id]=!c[id];sched();render();}
function getStaff(){return D.checks[sid+'_'+tkey()+'_'+ctab+'_s']||'';}
function setStaff(v){D.checks[sid+'_'+tkey()+'_'+ctab+'_s']=v;sched();}
function getHO(){return D.checks[sid+'_'+tkey()+'_'+ctab+'_ho']||'';}
function setHO(v){D.checks[sid+'_'+tkey()+'_'+ctab+'_ho']=v;sched();}
function getPHO(){return D.checks[sid+'_'+pkey()+'_'+ctab+'_ho']||'';}
function getUnchecked(){const s=st();if(!s)return[];const c=D.checks[sid+'_'+pkey()+'_'+ctab]||{};return s.items[ctab].filter(i=>!c[i.id]).map(i=>i.text);}
function tims(tab){const t=[];const s=st();if(!s)return t;for(const i of s.items[tab])if(!t.includes(i.timing))t.push(i.timing);return t;}
function addItem(tx,ti,u){if(!tx.trim())return;st().items[ctab].push({id:uid(),timing:ti,text:tx,url:u||''});sched();showAdd=false;render();}
function delItem(id){if(!confirm('この項目を削除しますか？'))return;const s=st();s.items[ctab]=s.items[ctab].filter(i=>i.id!==id);sched();render();}
function stEdit(id){eItem=JSON.parse(JSON.stringify(st().items[ctab].find(i=>i.id===id)));render();}
function svEdit(){const s=st();const idx=s.items[ctab].findIndex(i=>i.id===eItem.id);if(idx>=0)s.items[ctab][idx]={...eItem};eItem=null;sched();render();}
function addStore(){const nm=document.getElementById('asi').value.trim();if(!nm)return;D.stores.push({id:uid(),name:nm,items:JSON.parse(JSON.stringify(DI)),staff:[...DS]});sched();showAS=false;render();}
function svStore(){const nm=document.getElementById('esi').value.trim();const s=D.stores.find(x=>x.id===eStore.id);if(s&&nm)s.name=nm;eStore=null;sched();render();}
function delStore(id){if(!confirm('この店舗を削除しますか？'))return;D.stores=D.stores.filter(s=>s.id!==id);sched();render();}

function rStores(){
  let h='<div class="header"><h1>チェックリスト管理</h1><div class="hright">'+badge()+'<div class="dbadge">'+today()+'</div></div></div>';
  h+='<div class="shd"><span class="stitle">店舗一覧</span><button class="bsm" onclick="showAS=true;render()">+ 店舗を追加</button></div>';
  if(showAS)h+='<div class="fcard"><div class="fg"><label class="flbl">店舗名</label><input class="fi" id="asi" placeholder="例：札幌駅前店"></div><div class="fa"><button class="bcan" onclick="showAS=false;render()">キャンセル</button><button class="bpri" onclick="addStore()">追加</button></div></div>';
  if(eStore)h+='<div class="fcard"><div class="fg"><label class="flbl">店舗名を変更</label><input class="fi" id="esi" value="'+q(eStore.name)+'"></div><div class="fa"><button class="bcan" onclick="eStore=null;render()">キャンセル</button><button class="bpri" onclick="svStore()">保存</button></div></div>';
  if(!D.stores.length)return h+'<div class="nos">店舗がありません。追加してください。</div>';
  h+='<div class="sgrid">';
  for(const s of D.stores){
    const od=Object.values((D.checks||{})[s.id+'_'+tkey()+'_open']||{}).filter(Boolean).length;
    const cd=Object.values((D.checks||{})[s.id+'_'+tkey()+'_close']||{}).filter(Boolean).length;
    h+='<div class="scard" onclick="sid=\''+s.id+'\';view=\'checklist\';ctab=\'open\';showAdd=false;eItem=null;showPrev=false;render()">';
    h+='<div class="sacts" onclick="event.stopPropagation()">';
    h+='<button class="ibtn" onclick="eStore={id:\''+s.id+'\',name:\''+q(s.name)+'\'};render()">&#9998;</button>';
    h+='<button class="ibtn d" onclick="delStore(\''+s.id+'\')">&#10005;</button></div>';
    h+='<div class="sname">'+q(s.name)+'</div>';
    h+='<div class="smeta"><span>&#9728; 開店 '+od+'/'+s.items.open.length+'</span><span>&#9790; 閉店 '+cd+'/'+s.items.close.length+'</span></div></div>';
  }
  return h+'</div>';
}

function rCheck(){
  const s=st();if(!s)return'';
  const c=chks(),items=s.items[ctab]||[],done=items.filter(i=>c[i.id]).length,pct=items.length?Math.round(done/items.length*100):0;
  const ts=tims(ctab),hv=getHO(),phv=getPHO(),sv=getStaff(),unc=getUnchecked();
  let h='<div class="header"><h1>'+q(s.name)+'</h1><div class="hright">'+badge()+'<div class="dbadge">'+today()+'</div></div></div>';
  h+='<button class="bbk" onclick="view=\'stores\';render()">&#8592; 店舗一覧に戻る</button>';
  h+='<div class="tabs"><button class="tab '+(ctab==='open'?'active':'')+'" onclick="ctab=\'open\';showAdd=false;eItem=null;showPrev=false;render()">&#9728; 開店チェック</button>';
  h+='<button class="tab '+(ctab==='close'?'active':'')+'" onclick="ctab=\'close\';showAdd=false;eItem=null;showPrev=false;render()">&#9790; 閉店チェック</button></div>';
  h+='<div class="tblock">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h+='<div><div class="flblg">本日の担当者</div><select class="ssel" onchange="setStaff(this.value)"><option value="">-- 選択 --</option>';
  for(const nm of s.staff)h+='<option value="'+q(nm)+'" '+(sv===nm?'selected':'')+'>'+q(nm)+'</option>';
  h+='</select></div>';
  if(phv||unc.length)h+='<button class="pbtn" onclick="showPrev=!showPrev;render()">前日の引継ぎ '+(showPrev?'▲':'▼')+'</button>';
  h+='</div>';
  if(showPrev){
    if(unc.length){h+='<div class="unc-block"><div class="unc-title">&#9888; 前日の未チェック項目 ('+unc.length+'件)</div>';for(const tx of unc)h+='<div class="unc-item">&#8226; '+q(tx)+'</div>';h+='</div>';}
    if(phv)h+='<div class="pnote" style="margin-top:8px"><div class="plbl">前日の引継ぎコメント</div>'+q(phv)+'</div>';
  }
  h+='<div class="flblg" style="margin-bottom:4px;margin-top:10px">引継ぎ（次の担当者へ）</div>';
  h+='<textarea class="hota" placeholder="次の担当者へ伝えたいことを入力..." onchange="setHO(this.value)">'+q(hv)+'</textarea></div>';
  h+='<div class="sbar"><div class="pt"><div class="pf" style="width:'+pct+'%"></div></div><span class="st">'+done+' / '+items.length+' 完了 ('+pct+'%)</span></div>';
  for(const ti of ts){
    const col=TC[ti]||'#888';
    h+='<div class="tg"><div class="tlbl"><span style="width:8px;height:8px;border-radius:50%;background:'+col+';display:inline-block;flex-shrink:0"></span>'+q(ti)+'</div>';
    for(const item of items.filter(i=>i.timing===ti)){
      const ck=!!c[item.id];
      if(eItem&&eItem.id===item.id){
        const to=tims(ctab).map(t=>'<option value="'+q(t)+'" '+(t===eItem.timing?'selected':'')+'>'+q(t)+'</option>').join('');
        h+='<div class="ebox"><div style="font-size:13px;font-weight:600;margin-bottom:10px">項目を編集</div><div class="fg"><label class="flbl">項目名</label><input class="fi" value="'+q(eItem.text)+'" id="eit"></div><div class="fg"><label class="flbl">タイミング</label><select class="fsl" id="eiti">'+to+'</select></div><div class="fg"><label class="flbl">URL（任意）</label><input class="fi" style="font-size:13px" value="'+q(eItem.url||'')+'" id="eiu" placeholder="https://..."></div><div class="fa"><button class="bcan" onclick="eItem=null;render()">キャンセル</button><button class="bpri" onclick="eItem.text=document.getElementById(\'eit\').value;eItem.timing=document.getElementById(\'eiti\').value;eItem.url=document.getElementById(\'eiu\').value;svEdit()">保存</button></div></div>';
        continue;
      }
      h+='<div class="ci '+(ck?'done':'')+'"><div class="chk '+(ck?'checked':'')+'" onclick="togChk(\''+item.id+'\')">'+(ck?'<span style="color:#fff;font-size:13px;font-weight:700">&#10003;</span>':'')+'</div>';
      h+='<div class="ib"><span class="it '+(ck?'done':'')+'">'+q(item.text)+'</span>';
      if(item.url)h+='<a class="iu" href="'+q(item.url)+'" target="_blank">&#8599; '+q(item.url.replace(/^https?:\/\//,'').split('/')[0])+'</a>';
      h+='</div><div class="ia"><button class="ibtn" onclick="stEdit(\''+item.id+'\')">&#9998;</button><button class="ibtn d" onclick="delItem(\''+item.id+'\')">&#10005;</button></div></div>';
    }
    h+='</div>';
  }
  if(showAdd){
    const to=tims(ctab).map(t=>'<option value="'+q(t)+'">'+q(t)+'</option>').join('');
    h+='<div class="fcard"><div class="fg"><label class="flbl">項目名</label><input class="fi" id="nit" placeholder="項目名を入力..."></div><div class="fg"><label class="flbl">タイミング</label><select class="fsl" id="niti">'+to+'</select></div><div class="fg"><label class="flbl">URL（任意）</label><input class="fi" style="font-size:13px" id="niu" placeholder="https://..."></div><div class="fa"><button class="bcan" onclick="showAdd=false;render()">キャンセル</button><button class="bpri" onclick="addItem(document.getElementById(\'nit\').value,document.getElementById(\'niti\').value,document.getElementById(\'niu\').value)">追加</button></div></div>';
  }else{
    h+='<button class="bsm" style="margin-bottom:1rem" onclick="showAdd=true;render()">+ 項目を追加</button>';
  }
  return h;
}

function render(){document.getElementById('app').innerHTML=view==='stores'?rStores():rCheck();}
document.getElementById('app').innerHTML='<div class="ld"><div class="sp"></div><span>Firebaseからデータを読み込んでいます...</span></div>';
fbLoad();

</script>
</body>
</html>

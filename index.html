.iu:hover{text-decoration:underline}.bbk{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#666;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem;font-family:inherit}.bbk:hover{color:#1a1a1a}.stitle{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em}.shd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}.nos{text-align:center;padding:3rem 1rem;color:#888;font-size:14px}.ld{text-align:center;padding:3rem 1rem;color:#888;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:12px}.sp{width:24px;height:24px;border:2px solid #E0DED8;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.edit-banner{background:#FFF8E7;border:1px solid #F0A500;border-radius:10px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#8A5F00;display:flex;align-items:center;gap:8px}.ei{background:#fff;border:1px solid #D0CEC8;border-radius:6px;font-size:13px;padding:6px 8px;font-family:inherit;color:#1a1a1a}.ei:focus{outline:none;border-color:#F0A500}.ei-sel{font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid #D0CEC8;background:#fff;font-family:inherit;color:#1a1a1a}.staff-tag{display:inline-flex;align-items:center;gap:4px;background:#E1F5EE;border:1px solid #9FE1CB;border-radius:20px;padding:4px 10px;font-size:13px;color:#0F6E56;margin:3px}.staff-tag button{background:none;border:none;cursor:pointer;color:#0F6E56;font-size:15px;line-height:1;padding:0 0 0 2px;font-weight:bold}.edit-item{background:#fff;border:1px solid #F0A500;border-radius:10px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:8px;cursor:grab;user-select:none}.edit-item.dragging{opacity:.4;border-style:dashed}.edit-item.drag-over{border-color:#1D9E75;border-width:2px;background:#E1F5EE}.drag-handle{color:#bbb;font-size:18px;cursor:grab;flex-shrink:0;line-height:1}.edit-item-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}.edit-item-row2{display:flex;gap:6px}.closed-banner{background:#F0F0EE;border:1px solid #D0CEC8;border-radius:10px;padding:20px;text-align:center;color:#888;margin-bottom:1rem}.toggle-row{display:flex;align-items:center;gap:10px;padding:8px 0}.toggle-label{font-size:13px;color:#1a1a1a;flex:1}.toggle{position:relative;width:44px;height:24px;flex-shrink:0}.toggle input{opacity:0;width:0;height:0}.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#D0CEC8;border-radius:12px;transition:.2s}.toggle-slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}.toggle input:checked+.toggle-slider{background:#1D9E75}.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}.log-entry{background:#fff;border:1px solid #E0DED8;border-radius:12px;padding:14px 16px;margin-bottom:10px}.log-date{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:8px;display:flex;align-items:center;gap:8px}.log-date-badge{font-size:11px;background:#F5F5F3;border:1px solid #E0DED8;border-radius:6px;padding:2px 8px;color:#888;font-weight:400}.log-section{margin-bottom:8px}.log-section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}.log-row{font-size:13px;color:#444;padding:2px 0}.log-comment{font-size:13px;color:#444;white-space:pre-wrap;background:#F5F5F3;border-radius:6px;padding:6px 8px;margin-top:4px}.log-store-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}.log-store-tab{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #E0DED8;background:#fff;cursor:pointer;color:#666}.log-store-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}.log-empty{text-align:center;padding:2rem;color:#888;font-size:13px}.scard.sdragging{opacity:.35;border-style:dashed}.scard.sdrag-over{border:2px solid #1D9E75 !important;background:#E1F5EE}

<body>
<div class="page" id="app"></div>
<script>

const FB_URL='https://openclose-b0e38-default-rtdb.firebaseio.com';
const DI={open:[{id:'o1',timing:'朝礼前',text:'出勤時手洗いうがい',url:''},{id:'o2',timing:'朝礼前',text:'前日の引継ぎを確認',url:''},{id:'o3',timing:'朝礼前',text:'ZOOMイン！店頭PC・バックヤードPC',url:''},{id:'o4',timing:'朝礼前',text:'【バックオフィス】現金は出したか',url:''},{id:'o5',timing:'朝礼前',text:'タスクをLINEに流す',url:''},{id:'o6',timing:'朝礼前',text:'自エリアのカメラ映像全てデスクトップに表示しているか',url:''},{id:'o7',timing:'朝礼',text:'朝礼参加',url:''},{id:'o8',timing:'開店まで',text:'メルカリの梱包・集荷の手配',url:''},{id:'o9',timing:'開店まで',text:'前日の電話履歴を確認（あれば折り返し）',url:''}],close:[{id:'c1',timing:'閉店2時間前',text:'不要書類のシュレッダー処分をしたか',url:''},{id:'c2',timing:'閉店2時間前',text:'メルカリの発送（即日発送）',url:''},{id:'c3',timing:'閉店2時間前',text:'店内掃き・テーブル拭き掃除',url:''},{id:'c4',timing:'閉店1時間前',text:'現金締め（バックオフィスも忘れずに）',url:''},{id:'c5',timing:'閉店1時間前',text:'貴金属締め（赤丸チェック・名前印鑑・重さ一致必須確認）',url:''},{id:'c6',timing:'閉店1時間前',text:'【ネクストKPI】数値入力はしたか',url:''},{id:'c7',timing:'最終チェック',text:'キャビネットの施錠',url:''},{id:'c8',timing:'最終チェック',text:'防犯チェック（店頭カメラ初期位置に戻す）',url:''},{id:'c9',timing:'最終チェック',text:'退勤時の手洗いうがい',url:''}]};
const DS=['斉藤','林','鈴木','木村','青木','渡邊','龍生','酒井'];
const TC={'朝礼前':'#1D9E75','朝礼':'#378ADD','開店まで':'#639922','閉店2時間前':'#BA7517','閉店1時間前':'#D85A30','最終チェック':'#993C1D'};
const ALL_TIMINGS=['朝礼前','朝礼','開店まで','閉店2時間前','閉店1時間前','最終チェック'];
let D={stores:[],checks:{}},ss='ing',view='stores',sid=null,ctab='open',editMode=false,showPrev=true,showAS=false,eStore=null,sTimer=null,dragSrcId=null;
let logView={storeId:null,tab:'open',logs:null};


function effDate(off){
  var d=new Date();
  if(d.getHours()<4)d.setDate(d.getDate()-1);
  if(off)d.setDate(d.getDate()+off);
  return d;
}
function tkey(){var d=effDate(0);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function pkeyFor(s){
  var d=effDate(0),dow=d.getDay(),off=-1;
  if(s&&s.wedClosed&&dow===4)off=-2;
  var pd=effDate(off);
  return pd.getFullYear()+'-'+(pd.getMonth()+1)+'-'+pd.getDate();
}
function isClosedToday(s){return !!(s&&s.wedClosed&&effDate(0).getDay()===3);}
function today(){
  var d=effDate(0),days=['日','月','火','水','木','金','土'];
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+days[d.getDay()]+'）';
}
function fmtDate(key){
  var p=key.split('-'),days=['日','月','火','水','木','金','土'];
  var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  return p[0]+'年'+p[1]+'月'+p[2]+'日（'+days[d.getDay()]+'）';
}
function uid(){return 'x'+Date.now()+Math.random().toString(36).slice(2,6);}
function q(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}


async function fbGet(p){var r=await fetch(FB_URL+p+'.json');return await r.json();}
async function fbSet(p,d){var r=await fetch(FB_URL+p+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return await r.json();}
async function fbPatch(p,d){var r=await fetch(FB_URL+p+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return await r.json();}

async function fbLoad(){
  try{
    var data=await fbGet('/app');
    if(data&&data.stores){
      var stores=Array.isArray(data.stores)?data.stores:Object.values(data.stores);
      var norm=stores.map(function(s){return Object.assign({},s,{
        wedClosed:s.wedClosed||false,
        items:{
          open:Array.isArray(s.items.open)?s.items.open:Object.values(s.items.open||{}),
          close:Array.isArray(s.items.close)?s.items.close:Object.values(s.items.close||{})
        },
        staff:Array.isArray(s.staff)?s.staff:Object.values(s.staff||{})
      });});
      D={stores:norm,checks:data.checks||{}};
    }else{
      D={stores:[{id:'s1',name:'大谷地店',wedClosed:false,items:JSON.parse(JSON.stringify(DI)),staff:DS.slice()}],checks:{}};
      await fbSet('/app',D);
    }
    ss='ok';
    checkDayRollover();
  }catch(e){console.error(e);ss='err';D={stores:[{id:'s1',name:'大谷地店',wedClosed:false,items:JSON.parse(JSON.stringify(DI)),staff:DS.slice()}],checks:{}};}
  render();
}
async function fbSave(){ss='ing';ubadge();try{await fbSet('/app',D);ss='ok';}catch(e){console.error(e);ss='err';}ubadge();}
function sched(){clearTimeout(sTimer);sTimer=setTimeout(fbSave,1200);}
function ubadge(){var el=document.getElementById('sb');if(el)el.outerHTML=badge();}
function badge(){
  if(ss==='ok')return'<div class="sbadge sok" id="sb">&#10003; 保存済み</div>';
  if(ss==='err')return'<div class="sbadge serr" id="sb">&#10007; 保存失敗</div>';
  return'<div class="sbadge sing" id="sb">&#8593; 保存中...</div>';
}


// ---- 日付ロールオーバー: 朝4時検知 → ログ保存 → チェックリセット ----
function checkDayRollover(){
  var today=tkey();
  var lastKey=localStorage.getItem('lastActiveDay');
  if(lastKey&&lastKey!==today){
    // 前日分をログに保存してチェックをリセット
    archiveDay(lastKey);
  }
  localStorage.setItem('lastActiveDay',today);
}

async function archiveDay(dayKey){
  try{
    var logs={};
    for(var i=0;i<D.stores.length;i++){
      var s=D.stores[i];
      var entry={storeName:s.name,open:{},close:{}};
      for(var tab of ['open','close']){
        var c=(D.checks||{})[s.id+'_'+dayKey+'_'+tab]||{};
        var staff=(D.checks||{})[s.id+'_'+dayKey+'_'+tab+'_s']||'';
        var ho=(D.checks||{})[s.id+'_'+dayKey+'_ho']||'';
        var unchecked=s.items[tab].filter(function(item){return !c[item.id];}).map(function(item){return item.text;});
        var checked=s.items[tab].filter(function(item){return !!c[item.id];}).map(function(item){return item.text;});
        entry[tab]={staff:staff,handover:ho,unchecked:unchecked,checked:checked};
      }
      logs[s.id]=entry;
    }
    // Firebaseのlogsに保存
    await fbPatch('/logs/'+dayKey,logs);
    // チェック状態をリセット（引継ぎコメントは保持）
    var newChecks={};
    var keys=Object.keys(D.checks||{});
    for(var k=0;k<keys.length;k++){
      var key=keys[k];
      // _ho（引継ぎコメント）と_s（担当者）はそのまま保持
      if(key.indexOf('_ho')>-1||key.indexOf('_s')>-1){
        newChecks[key]=D.checks[key];
      }
      // 当日以降のデータは保持
      var parts=key.split('_');
      if(parts.length>=2){
        var dateStr=parts[1];
        if(dateStr>=tkey())newChecks[key]=D.checks[key];
      }
    }
    D.checks=newChecks;
    await fbSave();
  }catch(e){console.error('archive error:',e);}
}


function st(){return D.stores.find(function(s){return s.id===sid;})||null;}
function chks(){if(!D.checks)D.checks={};var k=sid+'_'+tkey()+'_'+ctab;if(!D.checks[k])D.checks[k]={};return D.checks[k];}
function togChk(id){if(editMode)return;var c=chks();c[id]=!c[id];sched();render();}
function getStaff(){return(D.checks||{})[sid+'_'+tkey()+'_'+ctab+'_s']||'';}
function setStaff(v){if(!D.checks)D.checks={};D.checks[sid+'_'+tkey()+'_'+ctab+'_s']=v;sched();}
function getHO(){return(D.checks||{})[sid+'_'+tkey()+'_ho']||'';}
function setHO(v){if(!D.checks)D.checks={};D.checks[sid+'_'+tkey()+'_ho']=v;sched();}
function getPHO(s){var pk=pkeyFor(s);return(D.checks||{})[sid+'_'+pk+'_ho']||'';}
function getPStaff(s){var pk=pkeyFor(s);return(D.checks||{})[sid+'_'+pk+'_'+ctab+'_s']||'';}
function getUnchk(s){
  if(!s)return[];
  var pk=pkeyFor(s);
  var c=(D.checks||{})[sid+'_'+pk+'_'+ctab]||{};
  return s.items[ctab].filter(function(i){return !c[i.id];}).map(function(i){return i.text;});
}
function tims(tab){var t=[];var s=st();if(!s)return t;for(var i=0;i<s.items[tab].length;i++){var ti=s.items[tab][i].timing;if(t.indexOf(ti)<0)t.push(ti);}return t;}


function flushEdits(){
  var s=st();if(!s)return;
  var sn=document.getElementById('edit-sname');if(sn&&sn.value.trim())s.name=sn.value.trim();
  var wc=document.getElementById('edit-wedclosed');if(wc!==null)s.wedClosed=wc.checked;
  for(var i=0;i<s.items[ctab].length;i++){
    var item=s.items[ctab][i];
    var t=document.getElementById('eit-'+item.id);
    var ti=document.getElementById('eiti-'+item.id);
    var u=document.getElementById('eiu-'+item.id);
    if(t)item.text=t.value;
    if(ti)item.timing=ti.value;
    if(u)item.url=u.value;
  }
}
function finishEdit(){flushEdits();editMode=false;sched();render();}
function switchTab(tab){flushEdits();ctab=tab;render();}
function delItem(id){flushEdits();var s=st();if(!s)return;s.items[ctab]=s.items[ctab].filter(function(i){return i.id!==id;});sched();render();}
function addItem(){
  flushEdits();var s=st();if(!s)return;
  var t=document.getElementById('new-item-text');
  var ti=document.getElementById('new-item-timing');
  var u=document.getElementById('new-item-url');
  if(!t||!t.value.trim())return;
  s.items[ctab].push({id:uid(),timing:ti?ti.value:'朝礼前',text:t.value.trim(),url:u?u.value.trim():''});
  sched();render();
}
function addStaffEdit(){
  var s=st();if(!s)return;
  var n=document.getElementById('new-staff-input');if(!n)return;
  var nm=n.value.trim();if(!nm||s.staff.indexOf(nm)>=0)return;
  s.staff.push(nm);n.value='';sched();render();
}
function delStaff(nm){var s=st();if(!s)return;s.staff=s.staff.filter(function(x){return x!==nm;});sched();render();}
function copyStore(id){
  var src=D.stores.find(function(s){return s.id===id;});if(!src)return;
  var ns=JSON.parse(JSON.stringify(src));
  ns.id=uid();ns.name=src.name+'（コピー）';
  ns.items.open=ns.items.open.map(function(i){return Object.assign({},i,{id:uid()});});
  ns.items.close=ns.items.close.map(function(i){return Object.assign({},i,{id:uid()});});
  D.stores.push(ns);sched();render();
}
function addStore(){var nm=document.getElementById('asi');if(!nm||!nm.value.trim())return;D.stores.push({id:uid(),name:nm.value.trim(),wedClosed:false,items:JSON.parse(JSON.stringify(DI)),staff:DS.slice()});sched();showAS=false;render();}
function svStore(){var nm=document.getElementById('esi');var s=D.stores.find(function(x){return x.id===eStore.id;});if(s&&nm&&nm.value.trim())s.name=nm.value.trim();eStore=null;sched();render();}
function delStore(id){if(!confirm('この店舗を削除しますか？'))return;D.stores=D.stores.filter(function(s){return s.id!==id;});sched();render();}
function onDragStart(e,id){dragSrcId=id;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dragging');}
function onDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.edit-item').forEach(function(el){el.classList.remove('drag-over');});}
function onDragOver(e,id){e.preventDefault();if(id!==dragSrcId){document.querySelectorAll('.edit-item').forEach(function(el){el.classList.remove('drag-over');});var el=document.querySelector('[data-id="'+id+'"]');if(el)el.classList.add('drag-over');}}
function onDrop(e,id){
  e.preventDefault();if(!dragSrcId||dragSrcId===id)return;
  flushEdits();var s=st();if(!s)return;
  var items=s.items[ctab];
  var fi=items.findIndex(function(i){return i.id===dragSrcId;});
  var ti=items.findIndex(function(i){return i.id===id;});
  if(fi<0||ti<0)return;
  var moved=items.splice(fi,1)[0];items.splice(ti,0,moved);
  dragSrcId=null;sched();render();
}


// ---- ログ画面 ----
async function openLog(storeId){
  logView.storeId=storeId;logView.tab='open';logView.logs=null;
  view='log';render();
  try{
    var data=await fbGet('/logs');
    // data = { 'YYYY-M-D': { storeId: entry, ... }, ... }
    var result=[];
    if(data){
      var dates=Object.keys(data).sort().reverse();
      for(var i=0;i<dates.length;i++){
        var dt=dates[i];
        if(data[dt]&&data[dt][storeId]){
          result.push({date:dt,entry:data[dt][storeId]});
        }
      }
    }
    logView.logs=result;
  }catch(e){console.error(e);logView.logs=[];}
  render();
}

function rLog(){
  var s=D.stores.find(function(x){return x.id===logView.storeId;})||{name:'?'};
  var h='<div class="header"><h1>&#128196; 引継ぎログ</h1><div class="hright"><div class="dbadge">'+today()+'</div></div></div>';
  h+='<button class="bbk" onclick="view=\'stores\';render()">&#8592; 店舗一覧に戻る</button>';
  h+='<div style="font-size:15px;font-weight:600;margin-bottom:1rem">'+q(s.name)+'</div>';
  h+='<div class="tabs" style="margin-bottom:1.25rem">';
  h+='<button class="tab '+(logView.tab==='open'?'active':'')+'" onclick="logView.tab=\'open\';render()">&#9728; 開店</button>';
  h+='<button class="tab '+(logView.tab==='close'?'active':'')+'" onclick="logView.tab=\'close\';render()">&#9790; 閉店</button>';
  h+='</div>';
  if(logView.logs===null){
    h+='<div class="ld"><div class="sp"></div><span>ログを読み込んでいます...</span></div>';
    return h;
  }
  if(!logView.logs.length){
    h+='<div class="log-empty">ログがまだありません。<br>毎朝4時に前日分が自動保存されます。</div>';
    return h;
  }
  var tab=logView.tab;
  for(var i=0;i<logView.logs.length;i++){
    var item=logView.logs[i];
    var e=item.entry[tab]||{};
    h+='<div class="log-entry">';
    h+='<div class="log-date">'+fmtDate(item.date);
    if(e.staff)h+='<span class="log-date-badge">&#128100; '+q(e.staff)+'</span>';
    h+='</div>';
    if(e.handover){
      h+='<div class="log-section"><div class="log-section-title">&#9993; 引継ぎコメント</div>';
      h+='<div class="log-comment">'+q(e.handover)+'</div></div>';
    }
    if(e.unchecked&&e.unchecked.length){
      h+='<div class="log-section"><div class="log-section-title">&#9888; 未チェック（'+e.unchecked.length+'件）</div>';
      for(var j=0;j<e.unchecked.length;j++)h+='<div class="log-row" style="color:#D85A30">&#8226; '+q(e.unchecked[j])+'</div>';
      h+='</div>';
    }
    if(e.checked&&e.checked.length){
      h+='<div class="log-section"><div class="log-section-title">&#10003; チェック済み（'+e.checked.length+'件）</div>';
      for(var j=0;j<e.checked.length;j++)h+='<div class="log-row" style="color:#0F6E56">&#8226; '+q(e.checked[j])+'</div>';
      h+='</div>';
    }
    if(!e.handover&&!(e.unchecked&&e.unchecked.length)&&!(e.checked&&e.checked.length)){
      h+='<div style="font-size:13px;color:#aaa">記録なし</div>';
    }
    h+='</div>';
  }
  return h;
}


function rStores(){
  var h='<div class="header"><h1>チェックリスト管理</h1><div class="hright">'+badge()+'<div class="dbadge">'+today()+'</div></div></div>';
  h+='<div class="shd"><span class="stitle">店舗一覧</span><button class="bsm" onclick="showAS=true;render()">+ 店舗を追加</button></div>';
  if(showAS)h+='<div class="fcard"><div class="fg"><label class="flbl">店舗名</label><input class="fi" id="asi" placeholder="例：札幌駅前店"></div><div class="fa"><button class="bcan" onclick="showAS=false;render()">キャンセル</button><button class="bpri" onclick="addStore()">追加</button></div></div>';
  if(eStore)h+='<div class="fcard"><div class="fg"><label class="flbl">店舗名を変更</label><input class="fi" id="esi" value="'+q(eStore.name)+'"></div><div class="fa"><button class="bcan" onclick="eStore=null;render()">キャンセル</button><button class="bpri" onclick="svStore()">保存</button></div></div>';
  if(!D.stores.length)return h+'<div class="nos">店舗がありません。追加してください。</div>';
  h+='<div class="sgrid">';
  for(var i=0;i<D.stores.length;i++){
    var s=D.stores[i],closed=isClosedToday(s);
    var od=Object.values((D.checks||{})[s.id+'_'+tkey()+'_open']||{}).filter(Boolean).length;
    var cd=Object.values((D.checks||{})[s.id+'_'+tkey()+'_close']||{}).filter(Boolean).length;
    var sid2=s.id;
    h+='<div class="scard'+(closed?' closed-today':'')+'" draggable="true" data-sid="'+sid2+'"'+'" ondragstart="onStoreDragStart(event,\''+sid2+'\')"'+'" ondragend="onStoreDragEnd(event)"'+'" ondragover="onStoreDragOver(event,\''+sid2+'\');event.preventDefault()"'+'" ondrop="onStoreDrop(event,\''+sid2+'\');event.preventDefault()"'+'" onclick="sid=\''+sid2+'\';view=\'checklist\';ctab=\'open\';editMode=false;showPrev=true;render()">';
    h+='<div class="sacts" onclick="event.stopPropagation()">';
    h+='<button class="ibtn" title="ログ" onclick="openLog(\''+sid2+'\')">&#128196;</button>';
    h+='<button class="ibtn" title="コピー" onclick="copyStore(\''+sid2+'\')">&#10064;</button>';
    h+='<button class="ibtn" title="名前変更" onclick="eStore={id:\''+sid2+'\',name:\''+q(s.name)+'\'};render()">&#9998;</button>';
    h+='<button class="ibtn d" title="削除" onclick="delStore(\''+sid2+'\')">&#10005;</button>';
    h+='</div>';
    h+='<div class="sname">'+q(s.name)+(s.wedClosed?'<span style="font-size:10px;color:#888;font-weight:400;margin-left:6px">水定休</span>':'')+'</div>';
    if(closed){h+='<div class="smeta"><span style="color:#D85A30">本日定休日</span></div>';}
    else{h+='<div class="smeta"><span>&#9728; 開店 '+od+'/'+s.items.open.length+'</span><span>&#9790; 閉店 '+cd+'/'+s.items.close.length+'</span></div>';}
    h+='</div>';
  }
  return h+'</div>';
}


function rCheck(){
  var s=st();if(!s)return'';
  var closed=isClosedToday(s);
  var c=chks(),items=s.items[ctab]||[];
  var done=items.filter(function(i){return c[i.id];}).length;
  var pct=items.length?Math.round(done/items.length*100):0;
  var ts=tims(ctab),hv=getHO(),phv=getPHO(s),pstaff=getPStaff(s),sv=getStaff(),unc=getUnchk(s);
  var h='<div class="header"><h1>'+q(s.name)+'</h1><div class="hright">'+badge()+'<div class="dbadge">'+today()+'</div></div></div>';
  h+='<button class="bbk" onclick="editMode=false;view=\'stores\';render()">&#8592; 店舗一覧に戻る</button>';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">';
  h+='<div class="tabs" style="flex:1;margin-bottom:0">';
  h+='<button class="tab '+(ctab==='open'?'active':'')+'" onclick="switchTab(\'open\')">&#9728; 開店チェック</button>';
  h+='<button class="tab '+(ctab==='close'?'active':'')+'" onclick="switchTab(\'close\')">&#9790; 閉店チェック</button>';
  h+='</div>';
  h+='<button class="blog" onclick="openLog(\''+s.id+'\')">&#128196; ログ</button>';
  h+=(editMode?'<button class="bedit active" onclick="finishEdit()">&#10003; 完了</button>':'<button class="bedit" onclick="editMode=true;render()">&#9998; 編集</button>');
  h+='</div>';
  if(editMode){
    h+='<div class="edit-banner">&#9998; 編集モード ― &#8597;ドラッグで並び替え・直接編集・削除。完了で保存。</div>';
    h+='<div class="fcard">';
    h+='<div class="fg"><label class="flbl">店舗名</label><input class="fi" id="edit-sname" value="'+q(s.name)+'"></div>';
    h+='<div class="toggle-row"><span class="toggle-label">水曜定休あり（水曜は定休・火曜の引継ぎを木曜に表示）</span>';
    h+='<label class="toggle"><input type="checkbox" id="edit-wedclosed"'+(s.wedClosed?' checked':'')+' onchange="flushEdits();sched()"><span class="toggle-slider"></span></label></div>';
    h+='<div class="fg" style="margin-top:12px"><label class="flbl">担当者</label><div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:8px">';
    for(var i=0;i<s.staff.length;i++){var nm=s.staff[i];h+='<span class="staff-tag">'+q(nm)+'<button type="button" onclick="delStaff(\''+q(nm)+'\')">&#10005;</button></span>';}
    h+='</div><div style="display:flex;gap:8px"><input class="fi" id="new-staff-input" placeholder="担当者名を追加..." style="font-size:13px" onkeydown="if(event.key===\'Enter\'){event.preventDefault();addStaffEdit();}"><button class="bsm" type="button" onclick="addStaffEdit()">追加</button></div></div></div>';
    h+='<div style="font-size:12px;font-weight:600;color:#888;margin-bottom:10px">チェック項目（'+(ctab==='open'?'開店':'閉店')+'） <span style="font-weight:400;font-size:11px">&#8597; ドラッグで並び替え</span></div>';
    for(var j=0;j<items.length;j++){
      var item=items[j];
      h+='<div class="edit-item" draggable="true" data-id="'+item.id+'" ondragstart="onDragStart(event,\''+item.id+'\');return false;" ondragend="onDragEnd(event)" ondragover="onDragOver(event,\''+item.id+'\');return false;" ondrop="onDrop(event,\''+item.id+'\')"><span class="drag-handle">&#8801;</span>';
      h+='<div class="edit-item-body"><input class="ei" id="eit-'+item.id+'" value="'+q(item.text)+'" placeholder="項目名" style="width:100%">';
      h+='<div class="edit-item-row2"><select class="ei-sel" id="eiti-'+item.id+'">';
      for(var k=0;k<ALL_TIMINGS.length;k++){var t=ALL_TIMINGS[k];h+='<option value="'+t+'"'+(item.timing===t?' selected':'')+'>'+t+'</option>';}
      h+='</select><input class="ei" id="eiu-'+item.id+'" value="'+q(item.url||'')+'" placeholder="URL（任意）" style="flex:1;font-size:12px"></div></div>';
      h+='<button type="button" class="ibtn d" onclick="delItem(\''+item.id+'\')">&#10005;</button></div>';
    }
    h+='<div class="fcard" style="margin-top:10px"><div style="font-size:13px;font-weight:600;margin-bottom:10px">+ 新しい項目を追加</div>';
    h+='<div class="fg"><label class="flbl">項目名</label><input class="fi" id="new-item-text" placeholder="項目名を入力..."></div>';
    h+='<div class="fg"><label class="flbl">タイミング</label><select class="fsl" id="new-item-timing">';
    for(var k=0;k<ALL_TIMINGS.length;k++)h+='<option value="'+ALL_TIMINGS[k]+'">'+ALL_TIMINGS[k]+'</option>';
    h+='</select></div><div class="fg"><label class="flbl">URL（任意）</label><input class="fi" id="new-item-url" placeholder="https://..."></div>';
    h+='<div class="fa"><button class="bpri" type="button" onclick="addItem()">追加</button></div></div>';
    return h;
  }
  if(closed){h+='<div class="closed-banner"><div style="font-size:32px;margin-bottom:8px">&#127970;</div><div style="font-size:16px;font-weight:600;margin-bottom:4px">本日は定休日です</div><div style="font-size:13px">お疲れさまでした！</div></div>';}
  h+='<div class="tblock">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div><div class="flblg">本日の担当者</div>';
  if(closed){h+='<select class="ssel" disabled><option>--</option></select>';}
  else{
    h+='<select class="ssel" onchange="setStaff(this.value)"><option value="">-- 選択 --</option>';
    for(var i=0;i<s.staff.length;i++){var nm=s.staff[i];h+='<option value="'+q(nm)+'"'+(sv===nm?' selected':'')+'>'+q(nm)+'</option>';}
    h+='</select>';
  }
  h+='</div>';
  if(phv||unc.length||pstaff)h+='<button class="pbtn" onclick="showPrev=!showPrev;render()">'+(showPrev?'▲ 隠す':'▼ 前日の引継ぎ')+'</button>';
  h+='</div>';
  if(showPrev&&(unc.length||phv||pstaff)){
    h+='<div class="pnote">';
    if(pstaff)h+='<div style="margin-bottom:8px"><div class="plbl">前日の担当者</div><div style="font-size:13px;font-weight:600;color:#1a1a1a">'+q(pstaff)+'</div></div>';
    if(unc.length){h+='<div class="unc-block"><div class="unc-title">&#9888; 前日の未チェック項目（'+unc.length+'件）</div>';for(var k=0;k<unc.length;k++)h+='<div class="unc-item">&#8226; '+q(unc[k])+'</div>';h+='</div>';}
    if(phv)h+='<div style="margin-top:'+(pstaff||unc.length?'8px':'0')+'"><div class="plbl">前日の引継ぎコメント</div><div style="font-size:13px;color:#444;white-space:pre-wrap">'+q(phv)+'</div></div>';
    h+='</div>';
  }
  h+='<div class="flblg" style="margin-bottom:4px;margin-top:10px">引継ぎ（次の担当者へ）</div>';
  h+='<textarea class="hota" placeholder="次の担当者へ伝えたいことを入力..."'+(closed?' disabled':'')+' onchange="setHO(this.value)">'+q(hv)+'</textarea></div>';
  if(!closed){
    h+='<div class="sbar"><div class="pt"><div class="pf" style="width:'+pct+'%"></div></div><span class="st">'+done+' / '+items.length+' 完了 ('+pct+'%)</span></div>';
    for(var ti=0;ti<ts.length;ti++){
      var timing=ts[ti],col=TC[timing]||'#888';
      h+='<div class="tg"><div class="tlbl"><span style="width:8px;height:8px;border-radius:50%;background:'+col+';display:inline-block;flex-shrink:0"></span>'+q(timing)+'</div>';
      var filtered=items.filter(function(i){return i.timing===timing;});
      for(var fi=0;fi<filtered.length;fi++){
        var item=filtered[fi],ck=!!c[item.id];
        h+='<div class="ci'+(ck?' done':'')+'"><div class="chk'+(ck?' checked':'')+'" onclick="togChk(\''+item.id+'\')">'+( ck?'<span style="color:#fff;font-size:13px;font-weight:700">&#10003;</span>':'')+'</div>';
        h+='<div class="ib"><span class="it'+(ck?' done':'')+'">'+q(item.text)+'</span>';
        if(item.url)h+='<a class="iu" href="'+q(item.url)+'" target="_blank">&#8599; '+q(item.url.replace(/^https?:\/\//,'').split('/')[0])+'</a>';
        h+='</div></div>';
      }
      h+='</div>';
    }
  }
  return h;
}


function onStoreDragStart(e,id){dragSrcId=id;var el=document.querySelector('[data-sid="'+id+'"]');if(el)el.classList.add('sdragging');}
function onStoreDragEnd(e){document.querySelectorAll('.scard').forEach(function(el){el.classList.remove('sdragging','sdrag-over');});}
function onStoreDragOver(e,id){e.preventDefault();if(id!==dragSrcId){document.querySelectorAll('.scard').forEach(function(el){el.classList.remove('sdrag-over');});var el=document.querySelector('[data-sid="'+id+'"]');if(el)el.classList.add('sdrag-over');}}
function onStoreDrop(e,id){e.preventDefault();document.querySelectorAll('.scard').forEach(function(el){el.classList.remove('sdragging','sdrag-over');});if(!dragSrcId||dragSrcId===id)return;var fi=D.stores.findIndex(function(s){return s.id===dragSrcId;});var ti=D.stores.findIndex(function(s){return s.id===id;});if(fi<0||ti<0)return;var moved=D.stores.splice(fi,1)[0];D.stores.splice(ti,0,moved);dragSrcId=null;sched();render();}
function render(){
  var el=document.getElementById('app');
  if(view==='stores')el.innerHTML=rStores();
  else if(view==='log')el.innerHTML=rLog();
  else el.innerHTML=rCheck();
}
document.getElementById('app').innerHTML='<div class="ld"><div class="sp"></div><span>Firebaseからデータを読み込んでいます...</span></div>';
fbLoad();
